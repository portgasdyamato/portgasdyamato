<svg viewBox="0 0 800 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
  <style>
    .star { fill: #fff0f5; animation: twinkle 3s infinite alternate ease-in-out; }
    .star-pink { fill: #ffb6c1; animation: twinkle 4s infinite alternate ease-in-out; }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1.1); }
    }
  </style>
  
  <g class="star" style="animation-delay: 0s"><path d="M100,50 Q110,50 110,40 Q110,50 120,50 Q110,50 110,60 Q110,50 100,50" /></g>
  <g class="star-pink" style="animation-delay: -1s"><path d="M250,60 Q260,60 260,50 Q260,60 270,60 Q260,60 260,70 Q260,60 250,60" transform="scale(0.8) translate(60, 15)"/></g>
  <g class="star" style="animation-delay: -2s"><path d="M400,55 Q410,55 410,45 Q410,55 420,55 Q410,55 410,65 Q410,55 400,55" transform="scale(1.2) translate(-70, -5)"/></g>
  <g class="star-pink" style="animation-delay: -0.5s"><path d="M550,45 Q560,45 560,35 Q560,45 570,45 Q560,45 560,55 Q560,45 550,45" /></g>
  <g class="star" style="animation-delay: -1.5s"><path d="M700,50 Q710,50 710,40 Q710,50 720,50 Q710,50 710,60 Q710,50 700,50" transform="scale(0.9) translate(80, 15)"/></g>
</svg>
