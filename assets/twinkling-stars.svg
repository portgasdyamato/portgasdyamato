<svg viewBox="0 0 800 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .star { fill: #fff0f5; animation: twinkle 3s infinite alternate ease-in-out; }
    .star-pink { fill: #ffb6c1; animation: twinkle 4s infinite alternate ease-in-out; }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1.1); }
    }
  </style>
  
  <g transform="translate(100, 50)">
    <g class="star" style="animation-delay: 0s"><path d="M-10,0 Q0,0 0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0" /></g>
  </g>
  <g transform="translate(250, 70)">
    <g class="star-pink" style="animation-delay: -1s" transform="scale(0.8)"><path d="M-10,0 Q0,0 0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0" /></g>
  </g>
  <g transform="translate(400, 45)">
    <g class="star" style="animation-delay: -2s" transform="scale(1.2)"><path d="M-10,0 Q0,0 0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0" /></g>
  </g>
  <g transform="translate(550, 60)">
    <g class="star-pink" style="animation-delay: -0.5s"><path d="M-10,0 Q0,0 0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0" /></g>
  </g>
  <g transform="translate(700, 55)">
    <g class="star" style="animation-delay: -1.5s" transform="scale(0.9)"><path d="M-10,0 Q0,0 0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0" /></g>
  </g>
</svg>
