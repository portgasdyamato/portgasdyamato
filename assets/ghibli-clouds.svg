<svg viewBox="0 0 800 160" width="100%" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft glowing effect for that magical Ghibli feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <g id="cloud-fluffy">
      <!-- Shadow -->
      <g fill="#ffb6c1" opacity="0.3">
        <circle cx="20" cy="1" r="22" />
        <circle cx="50" cy="-5" r="28" />
        <circle cx="85" cy="-1" r="24" />
        <circle cx="115" cy="8" r="15" />
        <rect x="0" y="-2" width="125" height="25" rx="12.5" />
      </g>
      <!-- Highlight -->
      <g fill="#ffffff">
        <circle cx="25" cy="2" r="18" />
        <circle cx="50" cy="-5" r="25" />
        <circle cx="80" cy="0" r="20" />
        <circle cx="105" cy="8" r="12" />
        <rect x="7" y="0" width="105" height="20" rx="10" />
      </g>
    </g>
    
    <g id="cloud-long">
      <!-- Shadow -->
      <g fill="#ffb6c1" opacity="0.25">
        <circle cx="15" cy="0" r="18" />
        <circle cx="45" cy="-4" r="22" />
        <circle cx="80" cy="-10" r="28" />
        <circle cx="115" cy="-7" r="25" />
        <circle cx="145" cy="2" r="16" />
        <rect x="0" y="-2" width="155" height="20" rx="10" />
      </g>
      <!-- Highlight -->
      <g fill="#ffffff">
        <circle cx="20" cy="1" r="14" />
        <circle cx="45" cy="-3" r="18" />
        <circle cx="80" cy="-9" r="24" />
        <circle cx="110" cy="-5" r="20" />
        <circle cx="135" cy="3" r="12" />
        <rect x="6" y="0" width="135" height="15" rx="7.5" />
      </g>
    </g>

    <g id="cloud-small">
      <!-- Shadow -->
      <g fill="#ffb6c1" opacity="0.35">
        <circle cx="15" cy="1" r="15" />
        <circle cx="40" cy="-2" r="18" />
        <circle cx="72" cy="4" r="12" />
        <rect x="0" y="-2" width="85" height="18" rx="9" />
      </g>
      <!-- Highlight -->
      <g fill="#ffffff">
        <circle cx="18" cy="1" r="12" />
        <circle cx="40" cy="-2" r="15" />
        <circle cx="65" cy="4" r="9" />
        <rect x="6" y="0" width="70" height="13" rx="6.5" />
      </g>
    </g>
  </defs>

  <style>
    .float1 { animation: bob 7s infinite ease-in-out; }
    .float2 { animation: bob 9s infinite ease-in-out reverse; }
    .float3 { animation: bob 11s infinite ease-in-out; }
    .float4 { animation: bob 8s infinite ease-in-out reverse; }
    .float5 { animation: bob 10s infinite ease-in-out; }
    
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
    }
  </style>

  <!-- Far left small cloud -->
  <g transform="translate(30, 95)" filter="url(#glow)">
    <g class="float2" style="animation-delay: -2s;">
      <use href="#cloud-small" transform="scale(0.8)" />
    </g>
  </g>
  
  <!-- Left-center fluffy cloud -->
  <g transform="translate(140, 110)" filter="url(#glow)">
    <g class="float1" style="animation-delay: 0s;">
      <use href="#cloud-fluffy" transform="scale(1.1)" />
    </g>
  </g>
  
  <!-- Center top long cloud -->
  <g transform="translate(320, 80)" filter="url(#glow)">
    <g class="float4" style="animation-delay: -5s;">
      <use href="#cloud-long" transform="scale(0.9)" />
    </g>
  </g>

  <!-- Right-center small cloud -->
  <g transform="translate(520, 120)" filter="url(#glow)">
    <g class="float5" style="animation-delay: -3s;">
      <use href="#cloud-small" transform="scale(1.2)" />
    </g>
  </g>
  
  <!-- Right fluffy cloud -->
  <g transform="translate(640, 90)" filter="url(#glow)">
    <g class="float3" style="animation-delay: -7s;">
      <use href="#cloud-fluffy" transform="scale(0.9)" />
    </g>
  </g>
  
  <!-- Far right long cloud -->
  <g transform="translate(720, 115)" filter="url(#glow)">
    <g class="float1" style="animation-delay: -1s;">
      <use href="#cloud-long" transform="scale(0.7)" />
    </g>
  </g>

  <!-- Extra background cloud -->
  <g transform="translate(260, 110)" filter="url(#glow)">
    <g class="float2" style="animation-delay: -6s;">
      <use href="#cloud-small" transform="scale(0.7)" opacity="0.6" />
    </g>
  </g>

  <!-- Extra background cloud -->
  <g transform="translate(480, 85)" filter="url(#glow)">
    <g class="float1" style="animation-delay: -8s;">
      <use href="#cloud-fluffy" transform="scale(0.6)" opacity="0.7" />
    </g>
  </g>
</svg>
