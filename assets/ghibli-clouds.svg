<svg viewBox="0 0 800 160" width="100%" height="160" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <g id="pixel-cloud">
      <!-- Shadow -->
      <path d="M 12 0 H 20 V 4 H 22 V 2 H 26 V 4 H 28 V 6 H 30 V 12 H 2 V 8 H 4 V 6 H 6 V 4 H 10 V 6 H 12 V 0 Z" fill="#ffb6c1" opacity="0.8" transform="translate(2, 2)" />
      <!-- Main -->
      <path d="M 12 0 H 20 V 4 H 22 V 2 H 26 V 4 H 28 V 6 H 30 V 12 H 2 V 8 H 4 V 6 H 6 V 4 H 10 V 6 H 12 V 0 Z" fill="#ffffff" />
    </g>

    <g id="pixel-cloud-small">
      <!-- Shadow -->
      <path d="M 8 2 H 14 V 6 H 16 V 4 H 20 V 6 H 22 V 8 H 24 V 12 H 2 V 8 H 4 V 6 H 8 V 2 Z" fill="#ffb6c1" opacity="0.8" transform="translate(2, 2)" />
      <!-- Main -->
      <path d="M 8 2 H 14 V 6 H 16 V 4 H 20 V 6 H 22 V 8 H 24 V 12 H 2 V 8 H 4 V 6 H 8 V 2 Z" fill="#ffffff" />
    </g>
  </defs>

  <style>
    .float1 { animation: bob 7s infinite ease-in-out; }
    .float2 { animation: bob 9s infinite ease-in-out reverse; }
    .float3 { animation: bob 11s infinite ease-in-out; }
    .float4 { animation: bob 8s infinite ease-in-out reverse; }
    .float5 { animation: bob 10s infinite ease-in-out; }
    
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-24px); }
    }
  </style>

  <!-- Far left small cloud -->
  <g transform="translate(40, 80)">
    <g class="float2" style="animation-delay: -2s;">
      <use href="#pixel-cloud-small" transform="scale(3)" />
    </g>
  </g>
  
  <!-- Left-center big cloud -->
  <g transform="translate(160, 95)">
    <g class="float1" style="animation-delay: 0s;">
      <use href="#pixel-cloud" transform="scale(4)" />
    </g>
  </g>
  
  <!-- Center top small cloud -->
  <g transform="translate(340, 65)">
    <g class="float4" style="animation-delay: -5s;">
      <use href="#pixel-cloud-small" transform="scale(3.5)" />
    </g>
  </g>

  <!-- Right-center big cloud -->
  <g transform="translate(500, 105)">
    <g class="float5" style="animation-delay: -3s;">
      <use href="#pixel-cloud" transform="scale(3)" />
    </g>
  </g>
  
  <!-- Far right big cloud -->
  <g transform="translate(680, 75)">
    <g class="float3" style="animation-delay: -7s;">
      <use href="#pixel-cloud" transform="scale(2.5)" />
    </g>
  </g>

  <!-- Background small cloud (faded) -->
  <g transform="translate(280, 95)">
    <g class="float2" style="animation-delay: -6s;">
      <use href="#pixel-cloud-small" transform="scale(2)" opacity="0.6" />
    </g>
  </g>

  <!-- Background small cloud (faded) -->
  <g transform="translate(600, 70)">
    <g class="float1" style="animation-delay: -8s;">
      <use href="#pixel-cloud-small" transform="scale(2.5)" opacity="0.7" />
    </g>
  </g>
</svg>
