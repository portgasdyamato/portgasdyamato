<svg viewBox="0 0 800 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
  <style>
    .petal1 { fill: #ffb6c1; animation: blow1 5s infinite linear; }
    .petal2 { fill: #ff69b4; animation: blow2 6s infinite linear; }
    .petal3 { fill: #ffc0cb; animation: blow3 7s infinite linear; }
    @keyframes blow1 {
      0% { transform: translate(0px, 0px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(160px, 40px) rotate(120deg); opacity: 0; }
    }
    @keyframes blow2 {
      0% { transform: translate(0px, 0px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(180px, 20px) rotate(180deg); opacity: 0; }
    }
    @keyframes blow3 {
      0% { transform: translate(0px, 0px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(140px, 50px) rotate(90deg); opacity: 0; }
    }
  </style>
  
  <g transform="translate(50, 30) scale(0.8)">
    <g class="petal1" style="animation-delay: 0s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>
  
  <g transform="translate(200, 10) scale(0.7)">
    <g class="petal3" style="animation-delay: -3s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>

  <g transform="translate(300, 25) scale(0.6)">
    <g class="petal2" style="animation-delay: -2s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>

  <g transform="translate(420, 40) scale(0.85)">
    <g class="petal1" style="animation-delay: -1.5s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>

  <g transform="translate(520, 15) scale(0.9)">
    <g class="petal3" style="animation-delay: -4s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>
  
  <g transform="translate(620, 20) scale(0.75)">
    <g class="petal2" style="animation-delay: -3.5s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>

  <g transform="translate(730, 25) scale(1)">
    <g class="petal1" style="animation-delay: -1s;">
      <path d="M0,0 C10,-10 20,5 10,15 C5,10 -10,10 0,0" />
    </g>
  </g>
</svg>
